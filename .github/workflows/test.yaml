name: "Test"

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !contains(github.event.head_commit.message, '#notest') }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Setup Node 24"
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: "Install"
        id: install
        run: npm ci

      - name: "Build"
        if: ${{ !cancelled() }}
        run: npm run build

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: "Test"
        if: ${{ !cancelled() }}
        run: npm run test
