name: "⚠️ Report an Issue"
description: "Please let us know if something is not right..."
labels: ["bug"]
assignees:
  - smashedr

body:
  - type: markdown
    attributes:
      value: |
        ### All issues will be responded too.

  - type: textarea
    id: description
    validations:
      required: true
    attributes:
      label: Description
      description: Describe the issue you are experiencing.
      placeholder: Please describe the issue and how to reproduce it.

  - type: input
    id: website
    validations:
      required: false
    attributes:
      label: Site Link
      description: Provide a link to a website if applicable.
      placeholder: https://example.com/

  - type: textarea
    id: support
    validations:
      required: true
    attributes:
      label: Support Information
      description: Open the extension options, scroll to the bottom, click Copy Support Information and paste below.
      render: shell

  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to make this report!
